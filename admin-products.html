<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products – Strathmore Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">🏛 Strathmore Marketplace</div>
  <div class="sidebar-user">
    <div class="avatar" id="sidebarAvatar">A</div>
    <div>
      <div class="sidebar-uname" id="sidebarName">Loading…</div>
      <div class="sidebar-urole" id="sidebarRole">Administrator</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-foot">© 2024 Marketplace Admin</div>
</aside>

<div class="app-layout">
  <main class="app-main">

    <div class="app-topbar">
      <button class="icon-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-search">
        <span class="topbar-search-icon">🔍</span>
        <input type="text" id="prodSearch" placeholder="Search by title or seller…" oninput="renderProducts()">
      </div>
    </div>

    <div class="app-content">
      <div class="page-head"><div><h1>Manage Products</h1><p class="page-sub">Every listing across every vendor — moderate anything that violates guidelines.</p></div></div>

      <div class="pill-row" id="statusFilterPills" style="margin-bottom:16px">
        <button class="pill active" onclick="filterStatus('',this)">All</button>
        <button class="pill" onclick="filterStatus('active',this)">Active</button>
        <button class="pill" onclick="filterStatus('sold',this)">Sold</button>
        <button class="pill" onclick="filterStatus('pending',this)">Pending</button>
        <button class="pill" onclick="filterStatus('inactive',this)">Inactive</button>
      </div>

      <div class="card">
        <table class="data-table" style="width:100%">
          <thead><tr><th>Product</th><th>Seller</th><th>Category</th><th>Price</th><th>Status</th><th></th></tr></thead>
          <tbody id="productsTable">
            <tr><td colspan="6"><div class="spinner-wrap"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/main.js"></script>
<script>
  let allProds = []
  let statusFilter = ''

  function renderProducts() {
    const q = document.getElementById('prodSearch').value.toLowerCase()
    const tbody = document.getElementById('productsTable')
    let rows = allProds
    if (statusFilter) rows = rows.filter(p => p.status === statusFilter)
    if (q) rows = rows.filter(p => p.title.toLowerCase().includes(q) || (p.users?.full_name||'').toLowerCase().includes(q))

    if (!rows.length) { tbody.innerHTML = `<tr><td colspan="6">No products found.</td></tr>`; return }

    tbody.innerHTML = rows.map(p => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;background:var(--gray-bg);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden">${p.image_url ? `<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover">` : catEmoji(p.category)}</div>
            <a href="product.html?id=${p.id}" style="font-weight:600;font-size:0.875rem;color:var(--text)">${p.title}</a>
          </div>
        </td>
        <td style="font-size:0.82rem">${p.users?.full_name || 'Unknown'}</td>
        <td style="text-transform:capitalize;font-size:0.82rem;color:var(--text-3)">${p.category || '—'}</td>
        <td style="font-weight:700">${fmtPrice(p.price)}</td>
        <td>${statusBadge(p.status)}</td>
        <td><button class="action-icon-btn del" onclick="adminDeleteProduct('${p.id}')" title="Remove listing">🗑️</button></td>
      </tr>`).join('')
  }

  function filterStatus(s, el) {
    statusFilter = s
    document.querySelectorAll('#statusFilterPills .pill').forEach(p => p.classList.remove('active'))
    el.classList.add('active')
    renderProducts()
  }

  async function loadProducts() {
    const { data, error } = await sb.from('products').select('*, users(full_name)').order('created_at',{ascending:false})
    if (error) { document.getElementById('productsTable').innerHTML = `<tr><td colspan="6"><div class="alert alert-error">Failed to load products.</div></td></tr>`; return }
    allProds = data || []
    renderProducts()
  }

  async function adminDeleteProduct(id) {
    if (!confirm('Remove this listing? This cannot be undone.')) return
    const { error } = await sb.from('products').delete().eq('id', id)
    if (error) { showToast('Error removing listing.'); return }
    showToast('🗑️ Listing removed.')
    loadProducts()
  }

  requireRole('admin').then(async profile => {
    if (!profile) return
    await populateSidebar()
    loadProducts()
  })
</script>
</body>
</html>
