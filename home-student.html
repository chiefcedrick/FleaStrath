<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home – Strathmore Marketplace</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
</head>
<body class="has-bnav">

  <header class="pub-header">
    <button class="icon-btn" onclick="toggleMobileMenu()">☰</button>
    <a href="index.html" class="pub-logo">
      <span class="pub-logo-icon">🏛</span>
      <span>Strathmore Marketplace</span>
    </a>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="icon-btn">🔔</button>
      <div class="avatar avatar-sm" id="headerAvatar" style="cursor:pointer" onclick="location.href='login.html'">SS</div>
    </div>
  </header>

  <section style="background:var(--navy);color:white;padding:28px 18px 30px">
    <h1 id="heroGreeting" style="color:white;font-size:1.65rem;margin-bottom:10px">Find what you need for the semester.</h1>
    <p style="color:rgba(255,255,255,.72);font-size:0.875rem">The exclusive hub for Strathmore University students to trade safely.</p>
  </section>

  <main style="padding:20px 18px 80px">

    <!-- Category Pills -->
    <div class="pill-row" id="catPillsStudent">
      <button class="pill active" onclick="filterStudentCat('',this)">All Items</button>
      <button class="pill" onclick="filterStudentCat('textbooks',this)">Textbooks</button>
      <button class="pill" onclick="filterStudentCat('electronics',this)">Electronics</button>
      <button class="pill" onclick="filterStudentCat('furniture',this)">Furniture</button>
      <button class="pill" onclick="filterStudentCat('lab-gear',this)">Lab Gear</button>
      <button class="pill" onclick="filterStudentCat('clothing',this)">Clothing</button>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h2 style="font-size:1.05rem">Featured Listings</h2>
      <a href="marketplace.html" class="view-all">View All</a>
    </div>

    <div id="studentProducts">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

    <div style="height:16px"></div>

    <!-- Announcements -->
    <div class="announce-card mb-4" style="margin-bottom:16px">
      <div class="announce-head"><span>📢</span> Announcements</div>
      <div id="studentAnnouncements">
        <div class="spinner-wrap" style="padding:20px"><div class="spinner"></div></div>
      </div>
      <div class="announce-cta">
        <a href="news.html" style="font-size:0.82rem;font-weight:700;color:var(--navy)">View All Updates →</a>
      </div>
    </div>

    <!-- Campus Events -->
    <div class="events-card">
      <div class="events-head"><span>📅</span> Campus Events</div>
      <div id="studentEvents">
        <div class="spinner-wrap" style="padding:20px"><div class="spinner"></div></div>
      </div>
    </div>

  </main>

  <button class="fab" onclick="location.href='my-shop.html'">+</button>

  <nav class="bottom-nav">
    <button class="bnav-item active" onclick="location.href='home-student.html'"><span class="bnav-icon">🏠</span>Home</button>
    <button class="bnav-item" onclick="location.href='marketplace.html'"><span class="bnav-icon">🔍</span>Search</button>
    <button class="bnav-item" onclick="location.href='my-shop.html'"><span class="bnav-icon">🏷️</span>Sell</button>
    <button class="bnav-item" onclick="location.href='login.html'"><span class="bnav-icon">👤</span>Profile</button>
  </nav>

  <script src="js/main.js"></script>
  <script>
    let studentCat = ''

    function filterStudentCat(cat, el) {
      studentCat = cat
      document.querySelectorAll('#catPillsStudent .pill').forEach(p => p.classList.remove('active'))
      el.classList.add('active')
      loadStudentProducts()
    }

    async function loadStudentProducts() {
      const el = document.getElementById('studentProducts')
      showLoading(el)

      let query = sb.from('products')
        .select('*, users(full_name)')
        .eq('status','active')
        .order('created_at',{ascending:false})
        .limit(6)

      if (studentCat) query = query.eq('category', studentCat)

      const { data, error } = await query
      if (error || !data?.length) { showEmpty(el, 'No listings found.'); return }
      el.innerHTML = data.map(verticalCard).join('')
    }

    async function loadStudentAnnouncements() {
      const el = document.getElementById('studentAnnouncements')
      const { data } = await sb.from('announcements')
        .select('*').order('created_at',{ascending:false}).limit(2)
      if (!data?.length) { el.innerHTML='<div class="announce-item"><p class="text-sm text-gray">No announcements.</p></div>'; return }
      el.innerHTML = data.map(a => `
        <div class="announce-item">
          <div class="ann-tag-row">
            <span class="ann-tag ${a.tag==='policy'||a.tag==='alert'?'admin':'market'}">${(a.tag||'update').toUpperCase()}</span>
            <span class="ann-time">${timeAgo(a.created_at)}</span>
          </div>
          <div class="ann-title">${a.title}</div>
          <div class="ann-desc">${(a.body||'').slice(0,80)}${a.body&&a.body.length>80?'…':''}</div>
        </div>`).join('')
    }

    async function loadStudentEvents() {
      const el = document.getElementById('studentEvents')
      const { data } = await sb.from('events')
        .select('*').in('status',['upcoming','available','ongoing'])
        .order('event_date',{ascending:true}).limit(3)
      if (!data?.length) { el.innerHTML='<div class="campus-ev-item"><p class="text-sm text-gray">No upcoming events.</p></div>'; return }
      el.innerHTML = data.map(e => {
        const d  = e.event_date ? new Date(e.event_date) : null
        const mo = d ? d.toLocaleString('en-KE',{month:'short'}).toUpperCase() : ''
        const dy = d ? d.getDate() : ''
        return `
        <div class="campus-ev-item">
          <div class="ev-date-badge">
            <div class="mo">${mo}</div>
            <div class="dy">${dy}</div>
          </div>
          <div>
            <div class="ev-name">${e.name}</div>
            <div class="ev-place">${[e.location, e.start_time].filter(Boolean).join(' · ')}</div>
          </div>
        </div>`
      }).join('')
    }

    // Update header avatar with user initials
    async function initHeader() {
      const session = await getSession()
      if (!session) return
      const { data: profile } = await sb.from('users').select('full_name').eq('id',session.user.id).single()
      if (profile?.full_name) {
        const initials = profile.full_name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)
        document.getElementById('headerAvatar').textContent = initials
        document.getElementById('heroGreeting').textContent = `Find what you need for the semester, ${profile.full_name.split(' ')[0]}.`
      }
    }

    initHeader()
    loadStudentProducts()
    loadStudentAnnouncements()
    loadStudentEvents()
  </script>
</body>
</html>
